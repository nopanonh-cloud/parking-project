<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองที่จอดรถอัจฉริยะ (40 Slots + Car Icons)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 md:p-6">

    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-4xl w-full text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">🚗 ระบบจองที่จอดรถอัจฉริยะ 2.5</h1>
        <p class="text-gray-500 mb-6">โครงงานคอมพิวเตอร์ | ระบบแสดงผลรูปไอคอนรถยนต์แบบ Real-time</p>

        <div class="flex flex-wrap justify-center gap-6 mb-6 text-sm font-medium bg-gray-50 p-3 rounded-xl">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-lg">
                    <i class="fa-solid fa-road"></i>
                </div>
                <span class="text-left">
                    <span class="block text-xs text-gray-400 font-normal">ช่องว่าง</span>
                    <span id="total-available" class="text-emerald-600 font-bold text-base">40</span> ช่อง
                </span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center text-lg">
                    <i class="fa-solid fa-car"></i>
                </div>
                <span class="text-left">
                    <span class="block text-xs text-gray-400 font-normal">ถูกจองแล้ว</span>
                    <span id="total-reserved" class="text-rose-600 font-bold text-base">0</span> ช่อง
                </span>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6">
            <button onclick="switchZone('zone6')" id="tab-zone6" class="zone-tab bg-indigo-600 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-sm">อาคาร 6</button>
            <button onclick="switchZone('zone5')" id="tab-zone5" class="zone-tab bg-gray-200 text-gray-700 font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-sm hover:bg-gray-300">อาคาร 5</button>
            <button onclick="switchZone('zone4')" id="tab-zone4" class="zone-tab bg-gray-200 text-gray-700 font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-sm hover:bg-gray-300">อาคาร 4</button>
            <button onclick="switchZone('zoneArt')" id="tab-zoneArt" class="zone-tab bg-gray-200 text-gray-700 font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-sm hover:bg-gray-300">อาคารศิลปะ</button>
        </div>

        <div class="bg-gray-50 p-6 rounded-2xl border border-gray-100 mb-6">
            <h2 id="current-zone-title" class="text-lg font-bold text-gray-700 mb-4 text-left flex items-center gap-2">📍 กำลังแสดง: อาคาร 6</h2>
            
            <div id="parking-grid" class="grid grid-cols-2 sm:grid-cols-5 gap-4">
                </div>
        </div>

        <div class="bg-slate-50 p-5 rounded-xl mb-6 text-left border border-slate-100">
            <p class="text-gray-700 mb-2 text-center font-semibold">ซองจอดที่คุณเลือก: <span id="selected-slot" class="font-bold text-indigo-600 text-lg">ยังไม่ได้เลือก</span></p>
            
            <div id="booking-details" class="hidden text-sm border-t border-gray-200 pt-3 mt-2">
                <p class="text-gray-600">👤 <span class="font-semibold">ชื่อผู้จอง:</span> <span id="info-name" class="text-gray-900">-</span></p>
                <p class="text-gray-600 mt-1">🆔 <span class="font-semibold">ทะเบียนรถ:</span> <span id="info-plate" class="text-gray-900">-</span></p>
                <p class="text-amber-600 mt-1 flex items-center gap-1 font-medium">🔒 มีระบบล็อกรหัสผ่านป้องกันคนอื่นยกเลิก</p>
            </div>
        </div>

        <div id="input-form" class="bg-indigo-50 p-5 rounded-xl mb-6 text-left hidden">
            <h3 class="text-indigo-900 font-semibold mb-3 text-sm flex items-center gap-1">📝 กรอกข้อมูลเพื่อขับรถเข้าจอด</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div>
                    <label class="block text-xs text-indigo-700 mb-1 font-medium">ชื่อ-นามสกุล</label>
                    <input type="text" id="user-name" placeholder="เช่น นายสมชาย" class="w-full text-sm bg-white border border-indigo-200 rounded-lg p-2.5 outline-indigo-500">
                </div>
                <div>
                    <label class="block text-xs text-indigo-700 mb-1 font-medium">ทะเบียนรถ</label>
                    <input type="text" id="car-plate" placeholder="เช่น กข 1234" class="w-full text-sm bg-white border border-indigo-200 rounded-lg p-2.5 outline-indigo-500">
                </div>
                <div>
                    <label class="block text-xs text-indigo-700 mb-1 font-medium">ตั้งรหัสยกเลิก (เลข 4 ตัว)</label>
                    <input type="password" id="user-pin" maxlength="4" pattern="\d*" inputmode="numeric" placeholder="เช่น 1234" class="w-full text-sm bg-white border border-indigo-200 rounded-lg p-2.5 outline-indigo-500">
                </div>
            </div>
        </div>

        <div class="flex gap-3">
            <button id="btn-confirm" onclick="confirmBooking()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-all cursor-not-allowed shadow-lg opacity-50 text-sm" disabled>
                ยืนยันการจองและเอารถเข้าจอด
            </button>
            <button id="btn-cancel" onclick="cancelBooking()" class="hidden flex-1 bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg text-sm cursor-pointer">
                เอารถออกจากช่องจอด (ต้องใช้รหัสผ่าน)
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUk83XoFbE5E90R5mA4hxCGYQ6z7wZgZ8",
            authDomain: "my-parking-project-b0efb.firebaseapp.com",
            databaseURL: "https://my-parking-project-b0efb-default-rtdb.firebaseio.com",
            projectId: "my-parking-project-b0efb",
            storageBucket: "my-parking-project-b0efb.firebasestorage.app",
            messagingSenderId: "122760311804",
            appId: "1:122760311804:web:b6e5e34b550a0dd4e6b879"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let chosenSlot = "";
        let currentZone = "zone6";
        let currentDatabaseSnapshot = null;

        const zones = {
            zone6: { title: "อาคาร 6", prefix: "B6-" },
            zone5: { title: "อาคาร 5", prefix: "B5-" },
            zone4: { title: "อาคาร 4", prefix: "B4-" },
            zoneArt: { title: "อาคารศิลปะ", prefix: "ART-" }
        };

        // ฟังก์ชันสร้างช่องจอดรถแบบซอง (ดีไซน์เป็นไอคอนถนน/รถยนต์)
        function renderParkingGrid() {
            const gridContainer = document.getElementById('parking-grid');
            gridContainer.innerHTML = ""; 
            
            const prefix = zones[currentZone].prefix;

            for (let i = 1; i <= 10; i++) {
                const slotNumber = i < 10 ? "0" + i : i;
                const slotName = prefix + slotNumber;

                // สร้างปุ่มครอบตัวซองจอดรถ เพื่อให้กดเลือกช่องได้ง่าย
                const button = document.createElement('button');
                button.id = "btn-" + slotName;
                button.onclick = () => selectSlot(slotName);
                // ดีไซน์ให้เหมือนเส้นซองจอดรถสีขาวตามห้างสรรพสินค้า
                button.className = "border-x-2 border-t-2 border-b border-dashed border-gray-300 pt-4 pb-2 px-2 rounded-t-lg bg-gray-100 flex flex-col items-center justify-center gap-2 text-gray-500 font-bold transition-all hover:bg-gray-200 cursor-pointer shadow-inner min-h-[110px]";
                
                // ใส่โครงสร้างไอคอนและข้อความข้างในช่องจอด
                button.innerHTML = `
                    <div id="icon-container-${slotName}" class="text-2xl text-gray-400 transition-all">
                        <i class="fa-solid fa-road"></i>
                    </div>
                    <span class="text-xs tracking-wider block border-t border-gray-200 pt-1 w-full text-center text-gray-600">${slotName}</span>
                `;

                gridContainer.appendChild(button);
            }
            updateButtonColors();
        }

        window.switchZone = function(zoneKey) {
            currentZone = zoneKey;
            document.getElementById('current-zone-title').innerText = "📍 กำลังแสดง: " + zones[zoneKey].title;
            
            document.querySelectorAll('.zone-tab').forEach(tab => {
                tab.className = "zone-tab bg-gray-200 text-gray-700 font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-sm hover:bg-gray-300";
            });
            document.getElementById('tab-' + zoneKey).className = "zone-tab bg-indigo-600 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all cursor-pointer text-sm";
            
            resetUI();
            renderParkingGrid();
        }

        window.selectSlot = function(slotName) {
            chosenSlot = slotName;
            document.getElementById('selected-slot').innerText = slotName;

            // ลบขอบไฮไลต์เก่าออกทั้งหมด
            document.querySelectorAll('#parking-grid button').forEach(b => {
                b.classList.remove('ring-4', 'ring-indigo-500', 'border-indigo-500');
            });
            
            const btn = document.getElementById("btn-" + slotName);
            if (btn) {
                btn.classList.add('ring-4', 'ring-indigo-500', 'border-indigo-500');
            }

            // เช็กจากระบบว่าช่องนั้นเป็นสีแดง (มีรถจอดอยู่) หรือไม่
            const iconContainer = document.getElementById(`icon-container-${slotName}`);
            const isReserved = iconContainer ? iconContainer.classList.contains('text-rose-500') : false;

            if (isReserved) {
                document.getElementById('input-form').classList.add('hidden');
                document.getElementById('booking-details').classList.remove('hidden');
                document.getElementById('btn-confirm').classList.add('hidden');
                document.getElementById('btn-cancel').classList.remove('hidden');

                if (currentDatabaseSnapshot && currentDatabaseSnapshot[slotName]) {
                    const info = currentDatabaseSnapshot[slotName];
                    document.getElementById('info-name').innerText = info.name || "-";
                    document.getElementById('info-plate').innerText = info.plate || "-";
                }
            } else {
                document.getElementById('input-form').classList.remove('hidden');
                document.getElementById('booking-details').classList.add('hidden');
                document.getElementById('btn-confirm').classList.remove('hidden', 'opacity-50', 'cursor-not-allowed');
                document.getElementById('btn-confirm').removeAttribute('disabled');
                document.getElementById('btn-cancel').classList.add('hidden');
                
                document.getElementById('user-name').value = "";
                document.getElementById('car-plate').value = "";
                document.getElementById('user-pin').value = "";
            }
        }

        window.confirmBooking = function() {
            if (!chosenSlot) return;

            const nameInput = document.getElementById('user-name').value.trim();
            const plateInput = document.getElementById('car-plate').value.trim();
            const pinInput = document.getElementById('user-pin').value.trim();

            if (!nameInput || !plateInput || !pinInput) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน รวมถึงรหัสเลข 4 หลักด้วยครับ");
                return;
            }

            if (pinInput.length < 4) {
                alert("กรุณาตั้งรหัสผ่านเป็นตัวเลขให้ครบ 4 หลักครับ");
                return;
            }

            const bookingData = {
                status: "reserved",
                name: nameInput,
                plate: plateInput,
                pin: pinInput,
                timestamp: new Date().toLocaleString('th-TH')
            };
            
            set(ref(database, 'slots/' + chosenSlot), bookingData)
            .then(() => {
                alert("🎉 นำรถเข้าจอดที่ช่อง " + chosenSlot + " สำเร็จ!");
                resetUI();
            })
            .catch((error) => {
                alert("เกิดข้อผิดพลาด: " + error.message);
            });
        }

        window.cancelBooking = function() {
            if (!chosenSlot) return;

            if (currentDatabaseSnapshot && currentDatabaseSnapshot[chosenSlot]) {
                const correctPin = currentDatabaseSnapshot[chosenSlot].pin;
                const typedPin = prompt("🔑 ช่องนี้มีรถจอดอยู่ กรุณากรอกรหัสผ่าน 4 หลัก เพื่อเอารถออก:");

                if (typedPin === null) return;

                if (typedPin.trim() === correctPin.toString()) {
                    remove(ref(database, 'slots/' + chosenSlot))
                    .then(() => {
                        alert("🗑️ นำรถออกจากช่อง " + chosenSlot + " เรียบร้อย ช่องจอดว่างแล้วครับ!");
                        resetUI();
                    })
                    .catch((error) => {
                        alert("เกิดข้อผิดพลาด: " + error.message);
                    });
                } else {
                    alert("❌ รหัสผ่านไม่ถูกต้อง! คุณไม่มีสิทธิ์เอารถคันนี้ออกจากช่องจอด");
                }
            }
        }

        function resetUI() {
            chosenSlot = "";
            document.getElementById('selected-slot').innerText = "ยังไม่ได้เลือก";
            document.getElementById('input-form').classList.add('hidden');
            document.getElementById('booking-details').classList.add('hidden');
            
            document.getElementById('btn-confirm').classList.remove('hidden');
            document.getElementById('btn-confirm').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-confirm').setAttribute('disabled', 'true');
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        // ฟังก์ชันสำคัญ: เปลี่ยนสลับรูปถนนว่าง 🛣️ หรือรูปไอคอนรถยนต์ 🚗 ตามสถานะ Firebase
        function updateButtonColors() {
            let reservedCount = 0;

            // รีเซ็ตซองจอดรถทุกช่องบนหน้าจอให้กลายเป็น "ถนนว่างสีเทาอ่อน" ไว้ก่อน
            document.querySelectorAll('#parking-grid button').forEach(btn => {
                const slotId = btn.id.replace('btn-', '');
                const iconContainer = document.getElementById(`icon-container-${slotId}`);
                if (iconContainer) {
                    iconContainer.innerHTML = '<i class="fa-solid fa-road"></i>'; // รูปถนนว่าง
                    iconContainer.className = "text-2xl text-gray-300 animate-pulse";
                    btn.className = "border-x-2 border-t-2 border-b border-dashed border-gray-300 pt-4 pb-2 px-2 rounded-t-lg bg-white flex flex-col items-center justify-center gap-2 font-bold transition-all hover:bg-gray-50 cursor-pointer shadow-sm min-h-[110px]";
                }
            });

            // ไล่เช็กข้อมูลสดจากคลาวด์ Firebase
            if (currentDatabaseSnapshot) {
                Object.keys(currentDatabaseSnapshot).forEach((slotName) => {
                    if (currentDatabaseSnapshot[slotName].status === "reserved") {
                        reservedCount++; // นับยอดช่องเต็มรวมทั้งระบบ
                        
                        // ถ้าช่องที่ถูกจอง ดันอยู่โซนที่เปิดอยู่ ณ ตอนนี้ ให้เปลี่ยนไอคอนเป็นรถยนต์สีแดงทันที
                        const iconContainer = document.getElementById(`icon-container-${slotName}`);
                        const btn = document.getElementById("btn-" + slotName);
                        if (iconContainer && btn) {
                            iconContainer.innerHTML = '<i class="fa-solid fa-car-side"></i>'; // เปลี่ยนเป็นรูปไอคอนรถยนต์ด้านข้าง
                            iconContainer.className = "text-3xl text-rose-500 scale-110 drop-shadow-md transition-all";
                            btn.className = "border-x-2 border-t-2 border-b border-solid border-rose-200 pt-4 pb-2 px-2 rounded-t-lg bg-rose-50 flex flex-col items-center justify-center gap-2 font-bold transition-all hover:bg-rose-100 cursor-pointer shadow-sm min-h-[110px]";
                        }
                    }
                });
            }

            // คำนวณเลขอัปเดตบนกล่องข้อความสรุปผลด้านบน
            document.getElementById('total-reserved').innerText = reservedCount;
            document.getElementById('total-available').innerText = 40 - reservedCount;
        }

        const slotsRef = ref(database, 'slots');
        onValue(slotsRef, (snapshot) => {
            currentDatabaseSnapshot = snapshot.val();
            updateButtonColors();
        });

        renderParkingGrid();
    </script>
</body>
</html>
